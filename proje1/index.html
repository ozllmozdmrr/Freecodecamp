<!DOCTYPE html>
<html>
<header>
<h1 id="title">Music Box Form</h1>
<link rel="stylesheet" href="style.css">
</header>
<body>
<p id="description">Music box membership login form</p>
<form id="survey-form">
 <div class="input-head"> 
  <label for="name" id="name-label">Name</label>
       <input type="text" id="name" name="name" required placeholder="Enter your name">
  </input>
  <br>
  <label for="email" id="email-label">Email</label>
        <input type="input" type="email" name="email" id="email" required placeholder="Enter your Email">                                          
 </input> 
   <br>
  <label for="number" id="number-label">Age</label>
        <input type="number" name="number" id="number" min="10" max="100" required  placeholder="Age">
  </input>
  <br>
  <label for="dropdown" id="model">Music Box</label>
  <select id="dropdown" class="form-inputs">
     <option value="brown"> Brown Box </option>
     <option value="brown"> Red Box </option>
     <option value="brown"> Pink Box </option>
     <option value="brown"> Blue Box </option>
     <option value="brown"> Green Box </option>
 </select> 
 <br>
 <br> 
<label for="box_color" id="box_color"><strong>Box Size</strong></label>
<br>
  <input id="size" type="radio" id="small" name="size" value="small">
    <label for="size">Small</label>
<br>
<input id="size" type="radio" id="medium" name="size" value="medium">
    <label for="size">Medium</label> 
<br>
<input id="size" type="radio" id="large" name="size" value="large">
    <label for="size">Large</label>
<br>
<input id="size" type="radio" id="xl" name="size" value="xl">
    <label for="size">X-Large</label>
<br>
<input id="size" type="radio" id="xx-large" name="size" value="xx-large">
    <label for="size">XX-Large</label>
<br>
<br>
  
<label for="model"><strong>Box Model:</strong></label>
<br>
<input id="checkbox" type="checkbox" name="model" value="model1">
  <label for="checkbox"> Model 1 - $10 </label>
<br>
<input id="checkbox" type="checkbox" name="model" value="model2">
  <label for="checkbox"> Model 2 - $20 </label>
<br>
<input id="checkbox" type="checkbox" name="model" value="model3">
  <label for="checkbox"> Model 3 - $30 </label>
<br>
<input id="checkbox" type="checkbox" name="model" value="model4">
  <label for="checkbox"> Model 4 - $50 </label>
<br>
<br>

<label id="textarea">Add note </label>
<br>
<textarea id="textarea" name="note" rows="5" cols="30"></textarea>
<br>
<input id="gonder"  name="submit" type="submit" value="Place Order" class="submit-button">
</div>
</form>

</body>
</html>
